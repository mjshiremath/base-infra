name: Infrastructure Destroy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to destroy'
        required: true
        default: 'network'
        type: choice
        options:
          - network
          - eks
          - all

env:
  AWS_REGION: us-east-1
  TERRAGRUNT_TFPATH: terraform

jobs:
  destroy-confirmation:
    name: Destroy Confirmation
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.confirm.outputs.proceed }}
    steps:
      - name: Confirm destruction
        id: confirm
        run: |
          echo "⚠️  WARNING: This will destroy infrastructure!"
          echo "Target: ${{ github.event.inputs.target }}"
          echo "Proceeding with destruction..."
          echo "proceed=true" >> $GITHUB_OUTPUT

  destroy-network:
    name: Destroy Network
    needs: destroy-confirmation
    runs-on: ubuntu-latest
    if: needs.destroy-confirmation.outputs.proceed == 'true' && (github.event.inputs.target == 'network' || github.event.inputs.target == 'all')
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Set up Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.14/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Destroy network infrastructure
        run: make destroy-network

      - name: Upload destroy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-destroy-logs
          path: '**/*.log'

  destroy-eks:
    name: Destroy EKS
    needs: destroy-confirmation
    runs-on: ubuntu-latest
    if: needs.destroy-confirmation.outputs.proceed == 'true' && (github.event.inputs.target == 'eks' || github.event.inputs.target == 'all')
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Set up Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.14/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Destroy EKS infrastructure
        run: make destroy-eks

      - name: Upload destroy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eks-destroy-logs
          path: '**/*.log'
