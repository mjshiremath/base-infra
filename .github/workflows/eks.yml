name: EKS Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'terragrunt/dev/eks/**'
      - 'modules/eks/**'
      - 'Makefile'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TERRAGRUNT_TFPATH: terraform

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Set up Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.14/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Format check
        run: make format-check
        continue-on-error: true

      - name: Validate Terraform
        run: make validate-eks

  plan-and-apply:
    name: Plan and Apply EKS
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.x

      - name: Set up Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.14/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Plan EKS infrastructure
        run: make plan-eks

      - name: Apply EKS infrastructure
        run: make apply-eks

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eks-logs
          path: '**/*.log'